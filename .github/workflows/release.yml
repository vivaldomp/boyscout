name: release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC -> npm trusted publishing
      contents: write # gh release create
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          # Trusted publishing needs Node >= 22.14.0 as well as npm >= 11.5.1. On Node 20 the
          # OIDC exchange never engages, npm falls back to looking for a token that does not
          # exist, and the publish fails. This is the publish host only — the CLI itself still
          # targets node20 and declares engines >=20.
          node-version: "22"
          cache: pnpm
          # Deliberately NO registry-url. It is the sole trigger for setup-node's
          # configAuthentication (main.ts:62), which writes an .npmrc containing
          # `_authToken=${NODE_AUTH_TOKEN}` and then exports NODE_AUTH_TOKEN with the
          # placeholder value XXXXX-XXXXX-XXXXX-XXXXX when no real token is supplied
          # (authutil.ts:54-57). npm skips the OIDC exchange whenever a token is configured,
          # so that placeholder silently disables trusted publishing and the registry rejects
          # the request as anonymous — surfaced as a misleading E404 on PUT.
          #
          # Setting NODE_AUTH_TOKEN to "" does not help: an empty string is still a value, so
          # npm still takes the token path and fails with ENEEDAUTH instead. The variable must
          # be absent entirely, which means never asking setup-node for auth in the first place.
          # Every released setup-node (v4/v5/v6) injects this placeholder; only the unreleased
          # main branch is fixed. npm defaults to registry.npmjs.org, which is where we publish.

      # Node 22 ships npm 10.9; trusted publishing (OIDC) needs npm >= 11.5.1. Without this,
      # npm ignores OIDC, looks for a token that does not exist, and the publish fails.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # Assert the upgrade actually took effect on the npm that will run `publish`. The install
      # above prints no version, so a silently-ineffective upgrade would surface 10 steps later
      # as an opaque registry E404 rather than as a failure here.
      - name: Verify the publish host meets the trusted-publishing floor
        run: |
          NPM_V="$(npm --version)"
          NODE_V="$(node --version | sed 's/^v//')"
          echo "node $NODE_V, npm $NPM_V"
          [ "$(printf '11.5.1\n%s\n' "$NPM_V" | sort -V | head -1)" = "11.5.1" ] \
            || { echo "npm $NPM_V is below the 11.5.1 trusted-publishing floor" >&2; exit 1; }
          [ "$(printf '22.14.0\n%s\n' "$NODE_V" | sort -V | head -1)" = "22.14.0" ] \
            || { echo "node $NODE_V is below the 22.14.0 trusted-publishing floor" >&2; exit 1; }

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./apps/cli/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag $TAG != apps/cli version $PKG" >&2
            exit 1
          fi
          echo "releasing $PKG"

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm format:check
      - run: pnpm lint

      - run: pnpm --filter boyscout-ui build
      - run: pnpm --filter @boyscoutdev/cli build

      # Smoke-test the bundled binary before irreversible publish. The tsx-based gates above
      # (typecheck/test/format/lint) run on source and cannot see bundle-layer defects like
      # import.meta.url collapse. Only the built artifact will catch those.
      - name: Shebang present exactly once
        run: test "$(grep -c '^#!/usr/bin/env node' apps/cli/dist/bin.js)" = "1"
      - name: Bundled CLI scaffolds and generates
        run: |
          mkdir -p /tmp/bs-smoke
          node apps/cli/dist/bin.js init --root /tmp/bs-smoke
          cd /tmp/bs-smoke
          node "$GITHUB_WORKSPACE/apps/cli/dist/bin.js" generate
          node "$GITHUB_WORKSPACE/apps/cli/dist/bin.js" generate --check

      - name: Verify the tarball before publishing
        working-directory: apps/cli
        run: npm pack --dry-run

      # Reproduce npm's OIDC handshake (lib/utils/oidc.js) step by step so the registry states
      # why it refuses, instead of npm swallowing the reason and reporting a bare ENEEDAUTH.
      # Prints outcomes only — never the request token, the id_token, or an exchanged token.
      # Never blocks the publish: this is diagnosis, not a gate.
      - name: OIDC preflight diagnostics
        continue-on-error: true
        run: |
          echo "GITHUB_ACTIONS=${GITHUB_ACTIONS:-unset}"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL:   ${ACTIONS_ID_TOKEN_REQUEST_URL:+SET}${ACTIONS_ID_TOKEN_REQUEST_URL:-UNSET}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET}${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-UNSET}"
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "-> id-token:write is not effective; npm skips OIDC at oidc.js:63"
            exit 0
          fi

          # Step 1: ask GitHub for an id_token with npm's expected audience.
          ID_TOKEN="$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
            | jq -r '.value // empty')"
          if [ -z "$ID_TOKEN" ]; then
            echo "-> GitHub issued no id_token; npm skips OIDC at oidc.js:99"
            exit 0
          fi
          echo "id_token: obtained (${#ID_TOKEN} chars)"

          # The claims npm's trusted-publisher config is matched against. Not secret: this is
          # the public payload of a token scoped to npm, and it is exactly what must line up
          # with the repository/workflow recorded on npmjs.com.
          echo "--- id_token claims (repository / workflow / ref) ---"
          echo "$ID_TOKEN" | cut -d. -f2 | tr '_-' '/+' \
            | { read -r p; printf '%s' "$p$(printf '%*s' $(( (4 - ${#p} % 4) % 4 )) '' | tr ' ' '=')"; } \
            | base64 -d 2>/dev/null \
            | jq -r '{repository, workflow_ref, job_workflow_ref, ref, environment, aud}' 2>/dev/null \
            || echo "(could not decode claims)"

          # Step 2: the exchange npm performs at oidc.js:118. Its error body is the answer.
          echo "--- token exchange ---"
          CODE="$(curl -sS -o exchange.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $ID_TOKEN" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/@boyscoutdev%2Fcli")"
          echo "exchange: HTTP $CODE"
          jq -r 'if .token then "-> exchange SUCCEEDED (token withheld from log)" else "-> \(.message // .error // "no message")" end' \
            exchange.json 2>/dev/null || echo "(unparseable response)"
          rm -f exchange.json

      # Trusted publishing engages only when NO token is configured — npm takes the token path
      # whenever one exists, and an empty string still counts. Both failure modes are opaque
      # (E404 with a bad token, ENEEDAUTH with an empty one), so assert the precondition here
      # rather than decoding it from the registry's response again.
      - name: Publish to npm
        working-directory: apps/cli
        run: |
          [ -z "${NODE_AUTH_TOKEN+x}" ] || {
            echo "NODE_AUTH_TOKEN is set — npm would skip OIDC and publish would fail" >&2
            exit 1
          }
          [ -z "${NPM_CONFIG_USERCONFIG+x}" ] || {
            echo "NPM_CONFIG_USERCONFIG is set — an .npmrc may configure a token" >&2
            exit 1
          }
          # --loglevel verbose surfaces npm's own OIDC reasoning. lib/utils/oidc.js is
          # documented to never throw ("OIDC is always an optional feature"), so every failure
          # path returns undefined after logging at verbose/silly and publish falls through to
          # a bare ENEEDAUTH. Without this flag the actual cause is never printed.
          npm publish --access public --tag alpha --loglevel verbose

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --prerelease
