bridge: astryx-react
platform: react
questions:
  - id: screen
    type: single
    prompt: Screen type?
    options:
      - value: login
        contributes:
          id: login-card
          capability: component
          openui: 'Card { Heading(3, "Sign in") }'
      - value: dashboard
        contributes:
          id: dashboard-grid
          capability: component
          openui: 'Card { Grid(2) { Heading(3, "Overview") } }'
  - id: sections
    type: multi
    prompt: Which sections?
    enabledWhen: { screen: [dashboard] }
    options:
      - value: header
        contributes:
          id: header-bar
          capability: component
          openui: 'Card { Heading(2, "Header") }'
